name: Recolher IPMA Matosinhos

on:
  schedule:
    - cron: '15 10 * * *'
    - cron: '15 14 * * *'
    - cron: '15 20 * * *'
  workflow_dispatch:

concurrency:
  group: matosinhos-data-push
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Atualizar branch local
        run: git pull --ff-only origin main

      - name: Instalar packages R
        run: |
          install.packages(c("httr", "jsonlite", "dplyr", "readr"))
        shell: Rscript {0}

      - name: Correr script IPMA
        run: Rscript fetch_ipma.R

      - name: Commit dos dados IPMA se mudaram
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ daily/
          if git diff --staged --quiet; then
            echo "Sem alterações nos dados IPMA ou no relatório diário, nada a fazer."
          else
            git commit -m "Update IPMA Matosinhos $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:main
          fi
