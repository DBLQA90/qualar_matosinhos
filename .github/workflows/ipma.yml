name: Pipeline diário Matosinhos

on:
  schedule:
    # GitHub cron is UTC and can be delayed or occasionally missed. These
    # windows provide retries around the Lisbon morning and afternoon cycles;
    # the gate below runs each cycle only once per day.
    - cron: '*/15 8-11 * * *'
    - cron: '*/15 14-17 * * *'
  workflow_dispatch:

concurrency:
  group: matosinhos-data-push
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Atualizar branch local
        run: git pull --ff-only origin main

      - name: Validar ciclo local
        id: gate
        shell: bash
        run: |
          local_date="$(TZ=Europe/Lisbon date +'%Y-%m-%d')"
          local_time="$(TZ=Europe/Lisbon date +'%H:%M')"
          local_hour="$(TZ=Europe/Lisbon date +'%H')"
          local_minute="$(TZ=Europe/Lisbon date +'%M')"
          local_minutes=$((10#$local_hour * 60 + 10#$local_minute))

          cycle=""
          report_time=""
          schedule="${{ github.event.schedule }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            cycle="manual"
            report_time="$local_time"
          elif [ "$schedule" = "*/15 8-11 * * *" ]; then
            cycle="morning"
            report_time="10:00"
          elif [ "$schedule" = "*/15 14-17 * * *" ]; then
            cycle="afternoon"
            report_time="16:00"
          elif [ "$local_minutes" -ge 560 ] && [ "$local_minutes" -le 719 ]; then
            cycle="morning"
            report_time="10:00"
          elif [ "$local_minutes" -ge 920 ] && [ "$local_minutes" -le 1079 ]; then
            cycle="afternoon"
            report_time="16:00"
          fi

          if [ -z "$cycle" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Fora das janelas operacionais: ${local_date} ${local_time} Europe/Lisbon; schedule='${schedule}'."
            exit 0
          fi

          marker_path="data/workflow_run_markers.csv"
          cycle_id="${local_date}-${cycle}"
          if [ "$cycle" != "manual" ] &&
             [ -f "$marker_path" ] &&
             grep -q "^${cycle_id}," "$marker_path"; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Ciclo ${cycle_id} já executado."
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "cycle=${cycle}" >> "$GITHUB_OUTPUT"
          echo "cycle_id=${cycle_id}" >> "$GITHUB_OUTPUT"
          echo "local_date=${local_date}" >> "$GITHUB_OUTPUT"
          echo "report_time=${report_time}" >> "$GITHUB_OUTPUT"
          echo "A executar ciclo ${cycle_id}; arranque ${local_time} Europe/Lisbon; schedule='${schedule}'."

      - uses: r-lib/actions/setup-r@v2
        if: steps.gate.outputs.should_run == 'true'
        with:
          r-version: 'release'

      - name: Instalar packages R
        if: steps.gate.outputs.should_run == 'true'
        run: |
          install.packages(c("httr", "jsonlite", "dplyr", "readr"))
        shell: Rscript {0}

      - name: Atualizar dados externos com redundância
        if: steps.gate.outputs.should_run == 'true'
        run: Rscript run_daily_pipeline.R "${{ steps.gate.outputs.cycle_id }}" data

      - name: Aguardar hora do relatório
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          target_epoch="$(TZ=Europe/Lisbon date -d "${{ steps.gate.outputs.local_date }} ${{ steps.gate.outputs.report_time }}" +%s)"
          now_epoch="$(TZ=Europe/Lisbon date +%s)"
          wait_seconds=$((target_epoch - now_epoch))
          if [ "$wait_seconds" -gt 0 ]; then
            echo "A aguardar ${wait_seconds}s até ${{ steps.gate.outputs.report_time }} Europe/Lisbon."
            sleep "$wait_seconds"
          else
            echo "Hora do relatório já passou; a gerar agora."
          fi

      - name: Gerar relatório diário
        if: steps.gate.outputs.should_run == 'true'
        run: Rscript run_daily_pipeline.R "${{ steps.gate.outputs.cycle_id }}" report

      - name: Marcar ciclo concluído
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          marker_path="data/workflow_run_markers.csv"
          mkdir -p data
          if [ ! -f "$marker_path" ]; then
            echo "cycle_id,completed_at_utc" > "$marker_path"
          fi
          if ! grep -q "^${{ steps.gate.outputs.cycle_id }}," "$marker_path"; then
            echo "${{ steps.gate.outputs.cycle_id }},$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$marker_path"
          fi

      - name: Commit das alterações se mudaram
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ daily/ qualar_matosinhos.csv
          if git diff --staged --quiet; then
            echo "Sem alterações nos dados, relatório ou marcadores, nada a fazer."
          else
            git commit -m "Run daily Matosinhos pipeline $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:main
          fi
