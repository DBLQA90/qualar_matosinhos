name: Pipeline diário Matosinhos

on:
  schedule:
    # GitHub cron is UTC. Each target is listed for summer/winter Lisbon time,
    # with short retry slots. The gate below converts the scheduled UTC slot to
    # Europe/Lisbon and runs each phase only once per day.
    - cron: '30 8 * * *'
    - cron: '45 8 * * *'
    - cron: '0 9 * * *'
    - cron: '15 9 * * *'
    - cron: '30 9 * * *'
    - cron: '45 9 * * *'
    - cron: '0 10 * * *'
    - cron: '15 10 * * *'
    - cron: '30 10 * * *'
    - cron: '30 14 * * *'
    - cron: '45 14 * * *'
    - cron: '0 15 * * *'
    - cron: '15 15 * * *'
    - cron: '30 15 * * *'
    - cron: '45 15 * * *'
    - cron: '0 16 * * *'
    - cron: '15 16 * * *'
    - cron: '30 16 * * *'
  workflow_dispatch:

concurrency:
  group: matosinhos-data-push
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Atualizar branch local
        run: git pull --ff-only origin main

      - name: Validar fase local
        id: gate
        shell: bash
        run: |
          local_date="$(TZ=Europe/Lisbon date +'%Y-%m-%d')"
          local_time="$(TZ=Europe/Lisbon date +'%H:%M')"
          schedule="${{ github.event.schedule }}"

          phase=""
          cycle=""
          scheduled_local_time=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            phase="all"
            cycle="manual-${{ github.run_id }}"
            scheduled_local_time="$local_time"
          else
            cron_minute="$(printf '%s' "$schedule" | awk '{print $1}')"
            cron_hour="$(printf '%s' "$schedule" | awk '{print $2}')"
            scheduled_local_time="$(
              TZ=Europe/Lisbon date -d "$(date -u +%Y-%m-%d) ${cron_hour}:${cron_minute} UTC" +'%H:%M'
            )"

            case "$scheduled_local_time" in
              09:30|09:45)
                phase="data"
                cycle="morning"
                ;;
              10:00|10:15|10:30)
                phase="report"
                cycle="morning"
                ;;
              15:30|15:45)
                phase="data"
                cycle="afternoon"
                ;;
              16:00|16:15|16:30)
                phase="report"
                cycle="afternoon"
                ;;
            esac
          fi

          if [ -z "$phase" ] || [ -z "$cycle" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Fora das fases operacionais: local=${local_date} ${local_time}; scheduled_local=${scheduled_local_time}; schedule='${schedule}'."
            exit 0
          fi

          cycle_id="${local_date}-${cycle}"
          marker_id="${cycle_id}-${phase}"
          marker_path="data/workflow_run_markers.csv"
          if [ "$phase" != "all" ] &&
             [ -f "$marker_path" ] &&
             grep -q "^${marker_id}," "$marker_path"; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Fase ${marker_id} já executada."
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "phase=${phase}" >> "$GITHUB_OUTPUT"
          echo "cycle=${cycle}" >> "$GITHUB_OUTPUT"
          echo "cycle_id=${cycle_id}" >> "$GITHUB_OUTPUT"
          echo "marker_id=${marker_id}" >> "$GITHUB_OUTPUT"
          echo "local_date=${local_date}" >> "$GITHUB_OUTPUT"
          echo "scheduled_local_time=${scheduled_local_time}" >> "$GITHUB_OUTPUT"
          echo "A executar fase ${phase} do ciclo ${cycle_id}; arranque ${local_time} Europe/Lisbon; scheduled_local=${scheduled_local_time}; schedule='${schedule}'."

      - uses: r-lib/actions/setup-r@v2
        if: steps.gate.outputs.should_run == 'true'
        with:
          r-version: 'release'

      - name: Instalar packages R
        if: steps.gate.outputs.should_run == 'true'
        run: |
          install.packages(c("httr", "jsonlite", "dplyr", "readr"))
        shell: Rscript {0}

      - name: Atualizar dados externos
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          marker_path="data/workflow_run_markers.csv"
          data_marker="${{ steps.gate.outputs.cycle_id }}-data"
          phase="${{ steps.gate.outputs.phase }}"

          if [ "$phase" = "report" ] &&
             [ -f "$marker_path" ] &&
             grep -q "^${data_marker}," "$marker_path"; then
            echo "Dados já atualizados para ${data_marker}; a avançar para relatório."
            exit 0
          fi

          if [ "$phase" = "data" ] || [ "$phase" = "report" ] || [ "$phase" = "all" ]; then
            Rscript run_daily_pipeline.R "${{ steps.gate.outputs.cycle_id }}" data
          fi

      - name: Gerar relatório diário
        if: steps.gate.outputs.should_run == 'true' && (steps.gate.outputs.phase == 'report' || steps.gate.outputs.phase == 'all')
        run: Rscript run_daily_pipeline.R "${{ steps.gate.outputs.cycle_id }}" report

      - name: Marcar fase concluída
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          marker_path="data/workflow_run_markers.csv"
          mkdir -p data
          if [ ! -f "$marker_path" ]; then
            echo "cycle_id,completed_at_utc" > "$marker_path"
          fi

          add_marker() {
            marker="$1"
            if ! grep -q "^${marker}," "$marker_path"; then
              echo "${marker},$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$marker_path"
            fi
          }

          phase="${{ steps.gate.outputs.phase }}"
          if [ "$phase" = "data" ]; then
            add_marker "${{ steps.gate.outputs.cycle_id }}-data"
          elif [ "$phase" = "report" ]; then
            add_marker "${{ steps.gate.outputs.cycle_id }}-data"
            add_marker "${{ steps.gate.outputs.cycle_id }}-report"
          elif [ "$phase" = "all" ]; then
            add_marker "${{ steps.gate.outputs.cycle_id }}-data"
            add_marker "${{ steps.gate.outputs.cycle_id }}-report"
          fi

      - name: Commit das alterações se mudaram
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ daily/ qualar_matosinhos.csv
          if git diff --staged --quiet; then
            echo "Sem alterações nos dados, relatório ou marcadores, nada a fazer."
          else
            git commit -m "Run Matosinhos ${{ steps.gate.outputs.phase }} pipeline $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:main
          fi
