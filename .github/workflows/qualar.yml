name: Recolher QualAr Matosinhos

on:
  schedule:
    - cron: '17 7 * * *'
    - cron: '17 8 * * *'
  workflow_dispatch:

concurrency:
  group: matosinhos-data-push
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Atualizar branch local
        run: git pull --ff-only origin main

      - name: Instalar packages R
        run: |
          install.packages(c("httr", "jsonlite", "dplyr", "readr"))
        shell: Rscript {0}

      - name: Correr script
        run: Rscript fetch_qualar.R

      - name: Commit do CSV se mudou
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add qualar_matosinhos.csv daily/
          if git diff --staged --quiet; then
            echo "Sem alterações no CSV ou nos ficheiros diários, nada a fazer."
          else
            git commit -m "Update QualAr $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:main
          fi
