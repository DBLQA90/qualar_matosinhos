name: Recolher QualAr Matosinhos

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: qualar-push
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Verificar 08:00 em Lisboa
        id: lisbon_time
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_fetch=true" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ=Europe/Lisbon date +%H)" = "08" ]; then
            echo "run_fetch=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_fetch=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.lisbon_time.outputs.run_fetch == 'true'
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        if: steps.lisbon_time.outputs.run_fetch == 'true'
        with:
          r-version: 'release'

      - name: Atualizar branch local
        if: steps.lisbon_time.outputs.run_fetch == 'true'
        run: git pull --ff-only origin main

      - name: Instalar packages R
        if: steps.lisbon_time.outputs.run_fetch == 'true'
        run: |
          install.packages(c("httr", "jsonlite", "dplyr", "readr"))
        shell: Rscript {0}

      - name: Correr script
        if: steps.lisbon_time.outputs.run_fetch == 'true'
        run: Rscript fetch_qualar.R

      - name: Commit do CSV se mudou
        if: steps.lisbon_time.outputs.run_fetch == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add qualar_matosinhos.csv daily/
          if git diff --staged --quiet; then
            echo "Sem alterações no CSV ou nos ficheiros diários, nada a fazer."
          else
            git commit -m "Update QualAr $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:main
          fi
